# Captures one screenshot per screen in the participant flow, for
# documentation purposes. Screenshots land in the run's debug folder
# under .maestro/tests/<timestamp>/ as <name>.png.
appId: com.tawakkalnaos.participate
---
- launchApp:
    clearState: true
- tapOn:
    text: "Cancel"
    optional: true
- takeScreenshot: 01-home

- tapOn: "Paste test link or code"
- inputText: "twk://t/DEMO123?api=http://localhost:4000/api"
- tapOn: "Take a test"
- takeScreenshot: 02-link-entered
- tapOn: "Open test"

- extendedWaitUntil:
    visible: "Before you start"
    timeout: 20000
- takeScreenshot: 03-consent
- tapOn: "I agree — continue"

- extendedWaitUntil:
    visible: "About you"
    timeout: 10000
- takeScreenshot: 03b-intake
- tapOn: "e.g. Sara Ahmed"
- inputText: "Test User"
- tapOn: "e.g. 28"
- inputText: "28"
- tapOn: "Product designer"
- tapOn: "Continue"

- extendedWaitUntil:
    visible: "Screen recording"
    timeout: 10000
- takeScreenshot: 04-permission
- tapOn: "Enable screen recording"
- tapOn:
    text: "Continue without recording (dev)"
    optional: true

- extendedWaitUntil:
    visible: "Find a product you like"
    timeout: 10000
- takeScreenshot: 05-task1-intro
- tapOn: "Start task"

- extendedWaitUntil:
    visible: "Headphones"
    timeout: 20000
- takeScreenshot: 06-prototype-shop
- tapOn: "Headphones"

- extendedWaitUntil:
    visible: "Wireless Headphones"
    timeout: 10000
- takeScreenshot: 07-prototype-detail
- tapOn: "Done?"
- takeScreenshot: 08-task-sheet
- tapOn: "I completed the task"

- extendedWaitUntil:
    visible: "Buy the product"
    timeout: 10000
- tapOn: "Start task"
- extendedWaitUntil:
    visible: "Headphones"
    timeout: 20000
- tapOn: "Headphones"
- tapOn: "Add to cart"
- extendedWaitUntil:
    visible: "Checkout"
    timeout: 10000
- takeScreenshot: 09-prototype-cart
- tapOn: "Checkout"
- extendedWaitUntil:
    visible: "Pay €79"
    timeout: 10000
- tapOn: "Pay €79"
- extendedWaitUntil:
    visible: "Order confirmed!"
    timeout: 10000
- takeScreenshot: 10-prototype-success
- tapOn: "Done?"
- tapOn: "I completed the task"

- extendedWaitUntil:
    visible: "How easy was it to complete the checkout?"
    timeout: 10000
- takeScreenshot: 11-question-scale
- tapOn: "4"
- tapOn: "Submit answers"

- extendedWaitUntil:
    visible: "What would you improve about this app?"
    timeout: 10000
- takeScreenshot: 12-question-open-text
- tapOn: "Skip"

- extendedWaitUntil:
    visible: "Would you use this app again?"
    timeout: 10000
- takeScreenshot: 13-question-yesno
- tapOn: "Yes"
- tapOn: "Submit answers"

- extendedWaitUntil:
    visible: "Thank you!"
    timeout: 20000
- takeScreenshot: 14-done
